# Stack: API, Next apps, Caddy (+ optional Postgres/Redis in Docker)
#
# โหมด DB/Redis ภายนอก (ค่าเริ่มต้น) — ตั้ง DATABASE_URL / REDIS_URL ใน docker/.env ให้ชี้ managed DB
#   docker compose -f docker/docker-compose.yml --env-file docker/.env up -d --build
#
# โหมดรวม Postgres+Redis ใน Docker — เพิ่ม profile bundled-db
#   docker compose -f docker/docker-compose.yml --env-file docker/.env --profile bundled-db up -d --build
#
# DNS: ตั้ง A ของ api,pos,bo,kds,order,www ภายใต้ pos.blttech.net → IP เครื่องนี้
#
# Seed (ครั้งแรกหลัง DB ว่างหรือหลัง migrate):
#   docker compose -f docker/docker-compose.yml --env-file docker/.env run --rm api \
#     sh -c "cd /app/packages/database && bunx tsx prisma/seed.ts"

name: pos-sible

services:
  postgres:
    profiles: ["bundled-db"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bundled-db-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-serva}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    profiles: ["bundled-db"]
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:-bundled-db-change-me}",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-bundled-db-change-me}",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: "3333"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      USE_REAL_OMISE: ${USE_REAL_OMISE:-false}
      OMISE_PUBLIC_KEY: ${OMISE_PUBLIC_KEY:-}
      OMISE_SECRET_KEY: ${OMISE_SECRET_KEY:-}
      OMISE_WEBHOOK_SECRET: ${OMISE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    networks:
      - internal
    restart: unless-stopped

  pos:
    build:
      context: ..
      dockerfile: docker/Dockerfile.next
      args:
        APP_NAME: pos
        PORT: "3300"
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_ORIGIN:-https://api.pos.blttech.net}
        NEXT_PUBLIC_APP_URL: ${PUBLIC_POS_ORIGIN:-https://pos.pos.blttech.net}
    environment:
      PORT: "3300"
    networks:
      - internal
    restart: unless-stopped

  backoffice:
    build:
      context: ..
      dockerfile: docker/Dockerfile.next
      args:
        APP_NAME: backoffice
        PORT: "3100"
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_ORIGIN:-https://api.pos.blttech.net}
        NEXT_PUBLIC_APP_URL: ${PUBLIC_BO_ORIGIN:-https://bo.pos.blttech.net}
    environment:
      PORT: "3100"
    networks:
      - internal
    restart: unless-stopped

  kds:
    build:
      context: ..
      dockerfile: docker/Dockerfile.next
      args:
        APP_NAME: kds
        PORT: "3200"
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_ORIGIN:-https://api.pos.blttech.net}
        NEXT_PUBLIC_APP_URL: ${PUBLIC_KDS_ORIGIN:-https://kds.pos.blttech.net}
    environment:
      PORT: "3200"
    networks:
      - internal
    restart: unless-stopped

  selforder:
    build:
      context: ..
      dockerfile: docker/Dockerfile.next
      args:
        APP_NAME: selforder
        PORT: "3400"
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_ORIGIN:-https://api.pos.blttech.net}
        NEXT_PUBLIC_APP_URL: ${PUBLIC_ORDER_ORIGIN:-https://order.pos.blttech.net}
    environment:
      PORT: "3400"
    networks:
      - internal
    restart: unless-stopped

  landing:
    build:
      context: ..
      dockerfile: docker/Dockerfile.next
      args:
        APP_NAME: landing
        PORT: "3000"
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_ORIGIN:-https://api.pos.blttech.net}
        NEXT_PUBLIC_APP_URL: ${PUBLIC_WWW_ORIGIN:-https://www.pos.blttech.net}
    environment:
      PORT: "3000"
    networks:
      - internal
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - pos
      - backoffice
      - kds
      - selforder
      - landing
    networks:
      - internal
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
